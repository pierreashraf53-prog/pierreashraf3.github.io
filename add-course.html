<!DOCTYPE html>
<html>

<head>
    <title>Add Course</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-res.css">
</head>

<body>

    <header>
        <div class="container">
            <h2>Course Organizer</h2>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="courses.html">Courses</a></li>
                    <li><a href="add-course.html">Add</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="add-course-section">
            <form>
                <h2>Add New Course</h2>

                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" placeholder="e.g. Logic Design">
                </div>

                <div class="form-group">
                    <label>Instructor</label>
                    <input type="text" placeholder="Dr. Name">
                </div>

                <div class="form-group">
                    <label>Credit Hours</label>
                    <input type="number" placeholder="3">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" placeholder="CS / Math / Physics">
                </div>

                <div class="form-group full-width">
                    <label>Notes</label>
                    <textarea placeholder="Add any notes here..."></textarea>
                </div>

                <input type="submit" value="Save Course">
            </form>
        </section>
    </main>

    <footer>2026 PierreAshraf. All rights reserved.</footer>

</body>

</html>
